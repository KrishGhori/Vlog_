<link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
<style>
    /* PREMIUM NAVBAR */
.navbar {
    background: linear-gradient(90deg, #0d6efd, #6610f2);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    padding: 12px 0;
    transition: all 0.3s ease;
}

/* Brand Styling */
.navbar-brand {
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: #fff !important;
    transition: 0.3s;
}

.navbar-brand:hover {
    transform: scale(1.05);
}

/* Nav Links */
.navbar-nav .nav-link {
    color: #f1f1f1 !important;
    font-weight: 500;
    margin-left: 15px;
    position: relative;
    transition: 0.3s;
}

/* Hover Animation Underline */
.navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: white;
    transition: 0.3s;
}

.navbar-nav .nav-link:hover::after {
    width: 100%;
}

/* Hover Effect */
.navbar-nav .nav-link:hover {
    color: #ffffff !important;
    transform: translateY(-2px);
}

/* Active Link Highlight */
.navbar-nav .nav-link.active {
    color: #fff !important;
    font-weight: 600;
}

.navbar-nav .nav-link.active::after {
    width: 100%;
}
    body {
        font-family: 'Segoe UI', sans-serif;
        padding-top: 80px;
        background: linear-gradient(120deg, #f6f8ff, #e9f0ff);
    }
    h1.display-4 {
        margin-bottom: 15px;
        color: #343a40;
    }
    .lead {
        margin-bottom: 40px;
        font-weight: 500;
        color: #555;
    }
    .gallery-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 15px;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .gallery-item {
        position: relative;
        overflow: hidden;
        cursor: pointer;
    }
    .gallery-item:hover .gallery-img {
        transform: scale(1.1);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .gallery-caption {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 10px 0;
        background: rgba(0,0,0,0.6);
        color: #fff;
        text-align: center;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
    }
    .gallery-item:hover .gallery-caption {
        opacity: 1;
    }
    footer {
        background: #343a40;
        color: #fff;
        text-align: center;
        padding: 15px 0;
        margin-top: 50px;
    }
</style>
</head>

        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
        
      </ul>
    </div>
  </div>
</nav>

<section class="container text-center">
    <h1 class="display-4 fw-bold">Capture Life</h1>
    <p class="lead">Real moments. No fake vibes.</p>

    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="1img.jpg" data-lightbox="gallery" class="gallery-item">
