<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 80px;
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
        }

        h1.display-4 {
            margin-bottom: 20px;
        }

        .lead {
            margin-bottom: 40px;
            border-radius: 10px;
        }

        .gallery-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        footer {
            background: #343a40;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            margin-top: 50px;
        }

        figcaption {
            text-align: center;
            margin-top: 8px;
            font-weight: 500;
            color: #555;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">VlogSite</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="v1.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="content.html">Content</a></li>
        <li class="nav-item"><a class="nav-link" href="videos.html">Videos</a></li>
        <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="table.html">Table</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="container text-center">
    <h1 class="display-4 fw-bold">Capture Life</h1>
    <p class="lead bg-light p-3 text-muted">Real moments. No fake vibes.</p>

    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3">
            <figure>
                <img class="gallery-img" src="1img.jpg" alt="Flowers">
                <figcaption>Flowers</figcaption>
            </figure>
        </div>
        <div class="col-sm-6 col-md-4 col-lg-3">
            <figure>
                <img class="gallery-img" src="2img.jpg" alt="Adventures">
                <figcaption>Adventures</figcaption>
            </figure>
        </div>
        <div class="col-sm-6 col-md-4 col-lg-3">
            <figure>
                <img class="gallery-img" src="3img.jpg" alt="Nature">
                <figcaption>Nature</figcaption>
            </figure>
        </div>
        <div class="col-sm-6 col-md-4 col-lg-3">
            <figure>
                <img class="gallery-img" src="4img.jpg" alt="City Life">
                <figcaption>City Life</figcaption>
            </figure>
        </div>
    </div>
</section>

<dialog open>
   <p>Welcome to the gallery!</p>
</dialog>

<footer>
    © 2026 VlogSite
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
