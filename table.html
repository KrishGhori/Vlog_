<link rel="stylesheet" href="style.css">
<style>
  /* ===== GLOBAL ===== */
body {
    padding-top: 80px;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg,#f8f9fa,#e9efff);
    color: #343a40;
}

/* ===== PREMIUM NAVBAR ===== */
.navbar {
    background: linear-gradient(90deg, #0d6efd, #6610f2);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    padding: 12px 0;
}

.navbar-brand {
    font-size: 1.5rem;
    color: #fff !important;
}

.navbar-nav .nav-link {
    color: #f1f1f1 !important;
    margin-left: 15px;
    position: relative;
}

.navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: white;
    transition: 0.3s;
}

.navbar-nav .nav-link:hover::after,
.navbar-nav .nav-link.active::after {
    width: 100%;
}

/* ===== BUTTON STYLE ===== */
.btn-primary {
    background: linear-gradient(90deg,#0d6efd,#6610f2);
    border: none;
    border-radius: 50px;
}

.btn-primary:hover {
    transform: scale(1.05);
}

/* ===== CARDS ===== */
.card {
    border-radius: 20px;
    border: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* ===== FOOTER ===== */
footer {
    background: #1b1f38;
    color: white;
    text-align: center;
    padding: 25px 0;
    margin-top: 50px;
}

footer i {
    font-size: 22px;
    margin: 0 10px;
    cursor: pointer;
    transition: 0.3s;
}

footer i:hover {
    color: #ff416c;
    transform: scale(1.2);
}
</style>
</head>
<body>

</button>

<ul class="navbar-nav ms-auto">

</ul>
