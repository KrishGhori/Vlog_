<!DOCTYPE html>
<html>
<head>
<title>VlogSite | Videos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    /* ===== GLOBAL ===== */
body {
    padding-top: 80px;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg,#f8f9fa,#e9efff);
    color: #343a40;
}

/* ===== PREMIUM NAVBAR ===== */
.navbar {
    background: linear-gradient(90deg, #0d6efd, #6610f2);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    padding: 12px 0;
}

.navbar-brand {
    font-size: 1.5rem;
    color: #fff !important;
}

.navbar-nav .nav-link {
    color: #f1f1f1 !important;
    margin-left: 15px;
    position: relative;
}

.navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: white;
    transition: 0.3s;
}

.navbar-nav .nav-link:hover::after,
.navbar-nav .nav-link.active::after {
    width: 100%;
}

/* ===== BUTTON STYLE ===== */
.btn-primary {
    background: linear-gradient(90deg,#0d6efd,#6610f2);
    border: none;
    border-radius: 50px;
}

.btn-primary:hover {
    transform: scale(1.05);
}

/* ===== CARDS ===== */
.card {
    border-radius: 20px;
    border: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* ===== FOOTER ===== */
footer {
    background: #1b1f38;
    color: white;
    text-align: center;
    padding: 25px 0;
    margin-top: 50px;
}

footer i {
    font-size: 22px;
    margin: 0 10px;
    cursor: pointer;
    transition: 0.3s;
}

footer i:hover {
    color: #ff416c;
    transform: scale(1.2);
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand fw-bold" href="v1.html">VlogSite</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="v1.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="content.html">Content</a></li>
<li class="nav-item"><a class="nav-link active" href="videos.html">Videos</a></li>
<li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
<li class="nav-item"><a class="nav-link" href="table.html">Table</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
</ul>
</div>
</div>
</nav>

<section class="container mt-5 pt-5">
<h2 class="text-center mb-4">My Vlog Videos</h2>
<div class="row g-4">
<div class="col-md-6">
<div class="card p-3">
<h5>Travel Vlog</h5>
<video controls width="100%">
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<h5>Background Music</h5>
<audio controls>
<source src="back_s.mp3" type="audio/mpeg">
</audio>
</div>
</div>
</div>
</section>

<footer>
<p>© 2026 VlogSite</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
